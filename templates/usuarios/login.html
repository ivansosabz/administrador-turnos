{% extends 'layouts/base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
	<h1>Inicio de sesión</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
    </form>
    <a href="{% url 'signup' %}">¿No tienes una cuenta? Crea una</a>
{% endblock %}
