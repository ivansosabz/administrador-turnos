{% extends 'layouts/base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
	<h1>Crear cuenta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>
    <a href="{% url 'login' %}">¿Ya tienes una cuenta? Inicia sesión</a>
{% endblock %}
