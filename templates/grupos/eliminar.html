{% extends 'layouts/base.html' %}
{% block title %}Eliminación de grupos{% endblock %}
{% block content %}
    <h1>Estas seguro de eliminar el grupo {{ grupo.nombre }} ?</h1>
    <div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <div class="btn btn-secondary">
                <a href="{% url 'grupo' %}">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
