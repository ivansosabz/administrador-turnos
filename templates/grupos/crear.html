{% extends 'layouts/base.html' %}
{% block title %}Crear grupo{% endblock %}
{% block content %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Crear Grupo</button>
    </form>
    <a href="{% url 'grupo' %}">Volver</a>
{% endblock %}
